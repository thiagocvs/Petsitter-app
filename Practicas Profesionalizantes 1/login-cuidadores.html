<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso de Cuidadores - PetSitter</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #fff7f2, #ffe6d5);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      background-color: white;
      width: 400px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
    }

    .login-container h1 {
      text-align: center;
      color: #ff914d;
      margin-bottom: 10px;
    }

    .login-container p {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      background-color: #ff914d;
      color: white;
      border: none;
      padding: 14px;
      margin-top: 25px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background-color: #e57d3e;
    }

    .links {
      text-align: center;
      margin-top: 20px;
    }

    .links a {
      color: #ff914d;
      text-decoration: none;
      font-weight: bold;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 25px;
      color: #666;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-container">

    <h1>🐾 PetSitter</h1>

    <p>
      Ingresá como cuidador para administrar reservas,
      paseos y el cuidado de mascotas.
    </p>

    <form>

      <label>Correo electrónico</label>
      <input type="email" placeholder="cuidador@email.com">

      <label>Contraseña</label>
      <input type="password" placeholder="********">

      <button type="button" onclick="iniciarSesion()">
        Iniciar Sesión
      </button>

    </form>

    <div class="links">
      <p>¿No tenés cuenta?</p>
      <a href="registro-cuidadores.html">Registrarse como cuidador</a>
    </div>

    <a class="back" href="index.html">
      ← Volver al inicio
    </a>

  </div>

  <script>
    function iniciarSesion() {
      alert('Inicio de sesión exitoso 🐶');
    }
  </script>

</body>
</html>
